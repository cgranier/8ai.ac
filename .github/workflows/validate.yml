name: Validate Tool Listings

on:
  pull_request:
    paths:
      - '_tools/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml

      - name: Validate front matter
        run: node validate.js
